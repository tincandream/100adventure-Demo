<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>100 Adventure</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<header>


<img id="coverImage"
class="adventure-cover"
alt="Adventure Cover">


<h1 id="title"></h1>

<p class="subtitle" id="theme"></p>

<p id="details"></p>


<button class="button" onclick="startAdventure()">
Start Journey
</button>


</header>





<div class="tabs">

<button onclick="showTab('overview')">
Overview
</button>


<button onclick="showTab('stops')">
Stops
</button>


<button onclick="showTab('collect')">
Collect
</button>


<button onclick="showTab('playlist')">
Playlist
</button>


</div>







<section id="overview" class="tab-content">


<div class="card">

<div class="label">
About This Adventure
</div>


<p id="description"></p>


<h3>
Best Time
</h3>


<p id="bestTime"></p>


</div>


</section>







<section id="stops" class="tab-content">


<div class="card">

<div class="label">
Your Journey
</div>


<h2 id="progress">
0 Stops Visited
</h2>


<div id="stopsList"></div>


</div>


</section>







<section id="collect" class="tab-content">


<div class="card">

<div class="label">
Things To Notice
</div>


<div id="notice"></div>


</div>





<div class="card">

<div class="label">
Collect Along The Way
</div>


<div id="ephemera"></div>


<br>


<a class="button"
href="memory-card.html">

📸 Create Memory

</a>


</div>


</section>








<section id="playlist" class="tab-content">


<div class="card">

<div class="label">
Soundtrack
</div>


<h2 id="playlistTitle"></h2>


<a class="button"
id="playlistLink"
target="_blank">

Open Spotify

</a>


</div>


</section>









<div class="nav">


<a href="index.html">
🏠
<br>
Home
</a>


<a href="adventure.html">
🗺
<br>
Adventure
</a>


<a href="memories.html">
📸
<br>
Memories
</a>


<a href="passport.html">
🏕
<br>
Passport
</a>


<a href="create.html">
✂️
<br>
Create
</a>


</div>








<script src="adventures.js"></script>

<script src="app.js"></script>



<script>


document.getElementById("coverImage").src =
adventure.cover;


document.getElementById("title").innerHTML =
adventure.title;


document.getElementById("theme").innerHTML =
adventure.theme;


document.getElementById("details").innerHTML =
adventure.distance +
" • " +
adventure.duration;



document.getElementById("description").innerHTML =
adventure.description;


document.getElementById("bestTime").innerHTML =
adventure.bestTime;






let stopsHTML = "";



adventure.stops.forEach(function(stop,index){



stopsHTML += `


<div class="adventure">


<h2>
${stop.name}
</h2>


<p>
${stop.type}
</p>


<p>
${stop.description}
</p>


<p>
⏱ ${stop.visitTime}
</p>




<a class="button"
href="${stop.map}"
target="_blank">

📍 Navigate

</a>




<button class="button"
onclick="markVisited(${index})">

✓ Visited

</button>




<a class="button"
href="memory-card.html">

📸 Save Moment

</a>



<h3>
Collect Ideas
</h3>



<ul>

${stop.collect.map(item =>
`<li>${item}</li>`
).join("")}

</ul>



</div>


`;



});



document.getElementById("stopsList").innerHTML =
stopsHTML;








let noticeHTML = "";



adventure.noticeIdeas.forEach(function(item){


noticeHTML +=

`

<div class="creation">

👀 ${item}

</div>

`;


});



document.getElementById("notice").innerHTML =
noticeHTML;








let collectHTML = "";



adventure.ephemeraIdeas.forEach(function(item){


collectHTML +=

`

<div class="creation">

🎟 ${item}

</div>

`;


});



document.getElementById("ephemera").innerHTML =
collectHTML;








document.getElementById("playlistTitle").innerHTML =
adventure.playlist.title;



document.getElementById("playlistLink").href =
adventure.playlist.link;








function showTab(tab){


document.querySelectorAll(".tab-content")
.forEach(function(section){

section.style.display="none";

});


document.getElementById(tab)
.style.display="block";


}






function startAdventure(){


alert("Adventure Started 🚗");


}






showTab("overview");


updateProgress();



</script>


</body>

</html>
