<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Memories | 100 Adventure</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<header>

<h1>
My Memories
</h1>


<p class="subtitle">
Your adventure scrapbook
</p>


</header>







<div class="card">


<div class="label">
Saved Moments
</div>


<div id="memoryList"></div>


</div>







<div class="card">


<a class="button"
href="memory-card.html">

📸 Create New Memory

</a>


</div>







<div class="nav">


<a href="index.html">
🏠
<br>
Home
</a>


<a href="adventure.html">
🗺
<br>
Adventure
</a>


<a href="memories.html">

<br>
Memories
</a>


<a href="passport.html">
🏕
<br>
Passport
</a>


<a href="create.html">
✂️
<br>
Create
</a>


</div>







<script>


let memories =

JSON.parse(localStorage.getItem("memories"))

|| [];



let memoryList =
document.getElementById("memoryList");





if(memories.length === 0){


memoryList.innerHTML = `


<div class="creation">

No memories saved yet.

<br><br>

Start exploring and capture your first adventure.

</div>


`;



}

else {



memoryList.innerHTML = "";



memories.forEach(function(memory){



let collectedText = "";



memory.collected.forEach(function(item){


collectedText +=

`
<span>
🎟 ${item}
</span>
<br>
`;



});






memoryList.innerHTML += `


<div class="memory-card">



${memory.photo ?


`<img 
class="memory-image"
src="${memory.photo}">
`

:

""

}




<h2>
${memory.title}
</h2>



<p class="subtitle">
${memory.adventure}
</p>




<p>
${memory.note}
</p>




<div class="creation">

${collectedText}

</div>



</div>


`;



});



}



</script>






</body>

</html>
