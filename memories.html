<script>


let memories = 
JSON.parse(localStorage.getItem("memories"))
|| [];



let memoryList =
document.getElementById("memoryList");



if(memories.length > 0){


memoryList.innerHTML = "";



memories.forEach(function(memory){



memoryList.innerHTML += `


<div class="creation">


<h2>
${memory.title}
</h2>


<p>
${memory.note}
</p>


<p>
📍 ${memory.adventure}
</p>



</div>


`;


});



}



</script>
