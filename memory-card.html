<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Memory Card | 100 Adventure</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<header>

<h1>
Create Memory
</h1>

<p class="subtitle">
Save a moment from your adventure
</p>

</header>





<div class="card">


<div class="label">
Adventure
</div>


<input 
id="adventure"
class="input"
value="Alabama Scenic Byway"
readonly>


</div>







<div class="card">


<div class="label">
Your Moment
</div>


<input 
id="title"
class="input"
placeholder="Give this memory a title...">



<textarea
id="note"
class="textarea"
placeholder="Write anything you want to remember..."></textarea>


</div>







<div class="card">


<div class="label">
Add Photo
</div>


<input 
type="file"
id="photo"
accept="image/*"
onchange="previewPhoto()">



<img 
id="photoPreview"
class="memory-photo"
style="display:none;">


</div>







<div class="card">


<div class="label">
Collected Along The Way
</div>



<label>
<input type="checkbox" value="Receipt">
Receipt
</label>


<br>


<label>
<input type="checkbox" value="Postcard">
Postcard
</label>


<br>


<label>
<input type="checkbox" value="Map">
Map
</label>


<br>


<label>
<input type="checkbox" value="Local Item">
Local Item
</label>


<br>


<label>
<input type="checkbox" value="Nature Find">
Nature Find
</label>


</div>







<div class="card">


<button class="button"
onclick="saveMemory()">

📸 Save Memory

</button>


</div>








<div class="nav">


<a href="index.html">
🏠
<br>
Home
</a>


<a href="adventure.html">
🗺
<br>
Adventure
</a>


<a href="memories.html">
📸
<br>
Memories
</a>


<a href="passport.html">
🏕
<br>
Passport
</a>


<a href="create.html">
✂️
<br>
Create
</a>


</div>








<script>


let photoData = "";





function previewPhoto(){


let file =
document.getElementById("photo").files[0];


if(file){


let reader = new FileReader();



reader.onload = function(e){


photoData = e.target.result;



let preview =
document.getElementById("photoPreview");



preview.src = photoData;


preview.style.display="block";



}



reader.readAsDataURL(file);



}



}








function saveMemory(){



let collected = [];



document.querySelectorAll(
"input[type='checkbox']:checked"
)

.forEach(function(item){


collected.push(item.value);


});







let memory = {


adventure:
document.getElementById("adventure").value,


title:
document.getElementById("title").value,


note:
document.getElementById("note").value,


collected:
collected,


photo:
photoData


};






let memories =

JSON.parse(localStorage.getItem("memories"))

|| [];





memories.push(memory);





localStorage.setItem(

"memories",

JSON.stringify(memories)

);





alert("Memory saved! 📸");



window.location.href =
"memories.html";



}



</script>





</body>

</html>
