<body>


<header>

<h1>
Create Memory
</h1>

<p class="subtitle">

<div class="card">


<div class="label">
Adventure
</div>


<h2>
Alabama Scenic Byway
</h2>


</div>







<div class="card">


<div class="label">
Your Moment
</div>


<input 
type="text"
placeholder="Give this memory a title..."
class="input">


<textarea
placeholder="Write anything you want to remember..."
class="textarea">
</textarea>


</div>







<div class="card">


<div class="label">
Add Photo
</div>


<input 
type="file"
accept="image/*">


</div>







<div class="card">


<div class="label">
Collected Along The Way
</div>



<label>
<input type="checkbox">

</label>


<br>


<label>
<input type="checkbox">

</label>


<br>


<label>
<input type="checkbox">

</label>


<br>


<label>
<input type="checkbox">
 Local Item
</label>


<br>


<label>
<input type="checkbox">
 Nature Find
</label>


</div>







<div class="card">


<div class="label">
Save Memory
</div>


<button class="button"
onclick="saveMemory()">

Save Memory

</button>


</div>
